apiVersion: v1
kind: Secret
metadata:
  name: ventureflow-secrets
  namespace: ventureflow
type: Opaque
stringData:
  # Database
  database-url: "postgresql://user:password@postgres-service:5432/ventureflow"

  # Redis
  redis-url: "redis://:password@redis-service:6379/0"

  # JWT
  jwt-secret: "your-secret-key-here-min-32-chars-long"
  jwt-refresh-secret: "your-refresh-secret-key-min-32-chars"

  # OAuth Providers
  google-client-id: "your-google-client-id"
  google-client-secret: "your-google-client-secret"

  microsoft-client-id: "your-microsoft-client-id"
  microsoft-client-secret: "your-microsoft-client-secret"

  linkedin-client-id: "your-linkedin-client-id"
  linkedin-client-secret: "your-linkedin-client-secret"

  github-client-id: "your-github-client-id"
  github-client-secret: "your-github-client-secret"

  # Email
  smtp-host: "smtp.sendgrid.net"
  smtp-port: "587"
  smtp-user: "apikey"
  smtp-password: "your-sendgrid-api-key"

  # AI/Claude
  claude-api-key: "your-claude-api-key"

  # AWS
  aws-access-key-id: "your-aws-access-key"
  aws-secret-access-key: "your-aws-secret-key"
  aws-region: "us-east-1"

  # Elasticsearch
  elasticsearch-username: "elastic"
  elasticsearch-password: "your-elasticsearch-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: ventureflow-tls
  namespace: ventureflow
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTi... # base64 encoded certificate
  tls.key: LS0tLS1CRUdJTi... # base64 encoded key
