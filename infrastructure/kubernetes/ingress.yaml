apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ventureflow-ingress
  namespace: ventureflow
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.ventureflow.io
    - ventureflow.io
    - investor.ventureflow.io
    secretName: ventureflow-tls
  rules:
  - host: api.ventureflow.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ventureflow-api
            port:
              number: 80
  - host: ventureflow.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ventureflow-web
            port:
              number: 3000
  - host: investor.ventureflow.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ventureflow-investor-portal
            port:
              number: 3001
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@ventureflow.io
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
