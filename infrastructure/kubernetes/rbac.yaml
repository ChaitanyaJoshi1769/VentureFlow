apiVersion: v1
kind: ServiceAccount
metadata:
  name: ventureflow-api
  namespace: ventureflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ventureflow-api-role
  namespace: ventureflow
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ventureflow-api-rolebinding
  namespace: ventureflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ventureflow-api-role
subjects:
- kind: ServiceAccount
  name: ventureflow-api
  namespace: ventureflow
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ventureflow-quota
  namespace: ventureflow
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "100"
    services: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ventureflow-limits
  namespace: ventureflow
spec:
  limits:
  - max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "100m"
      memory: "256Mi"
    type: Pod
