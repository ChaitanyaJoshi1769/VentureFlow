# Install cert-manager for TLS certificates
---
apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  releaseName: cert-manager
  chart:
    repository: https://charts.jetstack.io
    name: cert-manager
    version: v1.13.0
  values:
    global:
      leaderElection:
        namespace: cert-manager
---
# Install NGINX Ingress Controller
apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: nginx-ingress
  namespace: ingress-nginx
spec:
  releaseName: nginx-ingress
  chart:
    repository: https://kubernetes.github.io/ingress-nginx
    name: ingress-nginx
    version: 4.9.0
  values:
    controller:
      service:
        type: LoadBalancer
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
---
# Install Prometheus for monitoring
apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  releaseName: prometheus
  chart:
    repository: https://prometheus-community.github.io/helm-charts
    name: kube-prometheus-stack
    version: 56.0.0
  values:
    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
---
# Install Grafana for visualization
apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  releaseName: grafana
  chart:
    repository: https://grafana.github.io/helm-charts
    name: grafana
    version: 7.0.0
  values:
    persistence:
      enabled: true
      size: 10Gi
    adminPassword: changeme
---
# Install Loki for log aggregation
apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  releaseName: loki
  chart:
    repository: https://grafana.github.io/helm-charts
    name: loki-stack
    version: 2.9.0
  values:
    loki:
      persistence:
        enabled: true
        size: 50Gi
---
# Install Jaeger for distributed tracing
apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: jaeger
  namespace: monitoring
spec:
  releaseName: jaeger
  chart:
    repository: https://jaegertracing.github.io/helm-charts
    name: jaeger
    version: 0.71.0
  values:
    cassandra:
      enabled: false
    elasticsearch:
      enabled: true
---
# Install External Secrets for secret management
apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  releaseName: external-secrets
  chart:
    repository: https://charts.external-secrets.io
    name: external-secrets
    version: 0.9.0
---
# Install ArgoCD for GitOps
apiVersion: helm.fluxcd.io/v1
kind: HelmRelease
metadata:
  name: argocd
  namespace: argocd
spec:
  releaseName: argocd
  chart:
    repository: https://argoproj.github.io/argo-helm
    name: argo-cd
    version: 5.51.0
  values:
    server:
      service:
        type: LoadBalancer
