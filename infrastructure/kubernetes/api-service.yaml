apiVersion: v1
kind: Service
metadata:
  name: ventureflow-api
  namespace: ventureflow
  labels:
    app: ventureflow-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: ventureflow-api
---
apiVersion: v1
kind: Service
metadata:
  name: ventureflow-api-headless
  namespace: ventureflow
  labels:
    app: ventureflow-api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 3000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: ventureflow-api
