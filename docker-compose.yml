version: "3.8"

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: ventureflow-postgres
    environment:
      POSTGRES_USER: ventureflow
      POSTGRES_PASSWORD: ventureflow_dev_password
      POSTGRES_DB: ventureflow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ventureflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ventureflow

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ventureflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ventureflow

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ventureflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ventureflow

  # Kibana (for Elasticsearch debugging)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ventureflow-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ventureflow

  # LocalStack for AWS emulation (optional, for local development)
  localstack:
    image: localstack/localstack:latest
    container_name: ventureflow-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,sns,dynamodb,secretsmanager
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - "${TMPDIR:-.}/localstack:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - ventureflow

  # PgAdmin for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ventureflow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ventureflow.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ventureflow

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  ventureflow:
    driver: bridge
